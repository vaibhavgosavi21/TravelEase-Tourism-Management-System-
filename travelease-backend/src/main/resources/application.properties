# ── Server ──────────────────────────────────────────
server.port=8080

# ── Database ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/travelease_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:your_256_bit_secret_key_change_this_in_production}
app.jwt.expiration-ms=86400000

# ── Swagger ───────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Mail ──────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── AWS ───────────────────────────────────────────────
aws.region=${AWS_REGION:ap-south-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:local-dev-key}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:local-dev-secret}
aws.sqs.queue-url=${SQS_QUEUE_URL:https://sqs.ap-south-1.amazonaws.com/your_account/travelease-bookings}

# Set to false to disable SQS consumer during local development
app.sqs.enabled=${SQS_ENABLED:false}

# ── Cloudinary ────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# ── File Upload ───────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
